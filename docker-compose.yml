# docker-compose.yml
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./backend/logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run start
    environment:
      - NODE_ENV=production

  # 1. OpenTelemetry Collector — receives traces from FastAPI, fans out to Tempo
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317" # gRPC endpoint (FastAPI sends here)

  # 2. Tempo — stores distributed traces
  tempo:
    image: grafana/tempo:latest
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    command: [ "-config.file=/etc/tempo.yaml" ]

  # 3. Loki — stores logs (reads your existing log files via Promtail)
  loki:
    image: grafana/loki:latest
    volumes:
      - loki_data:/loki

  # 4. Promtail — reads your existing backend/logs/ files and sends to Loki
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./backend/logs:/var/log/app # mounts your existing log directory!
      - ./observability/promtail.yaml:/etc/promtail/config.yaml

  # 4.5. Prometheus — stores metrics generated by OTEL collector
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # 5. Grafana — the unified dashboard UI
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # Visit http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin

volumes:
  tempo_data:
  loki_data:
  grafana_data:
  prometheus_data:

